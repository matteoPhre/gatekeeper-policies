name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run a publish dry-run without publishing to npm"
        required: true
        default: true
        type: boolean
      tag:
        description: "Release tag to validate against package.json (example: v1.2.3)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write # Fondamentale per --provenance e OIDC

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release checks
        run: npm run release:check

      - name: Validate release tag
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag || github.ref_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag '$TAG'. Expected format: vX.Y.Z or prerelease variants"
            exit 1
          fi
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [[ "v$PKG_VERSION" != "$TAG" ]]; then
            echo "Tag '$TAG' does not match package.json version 'v$PKG_VERSION'"
            exit 1
          fi

      - name: Publish package (dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: npm publish --dry-run --access public

      - name: Publish package (NPM token fallback)
        if: ${{ (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)) && secrets.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Publish package (OIDC trusted publishing)
        if: ${{ (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)) && secrets.NPM_TOKEN == '' }}
        run: npm publish --access public --provenance